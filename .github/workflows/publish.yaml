name: Publish Package to npm

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: "24.x"
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false

      - run: npm ci
      - run: npm run build

      - name: Read package metadata
        id: package
        run: |
          echo "name=$(node -p \"require('./package.json').name\")" >> "$GITHUB_OUTPUT"
          echo "version=$(node -p \"require('./package.json').version\")" >> "$GITHUB_OUTPUT"

      - name: Check if version exists on npm
        id: npm_version
        run: |
          if npm view "${{ steps.package.outputs.name }}@${{ steps.package.outputs.version }}" version >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Version ${{ steps.package.outputs.version }} already exists for ${{ steps.package.outputs.name }}. Skipping publish."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Determine npm dist-tag
        id: dist_tag
        if: steps.npm_version.outputs.exists == 'false'
        run: |
          VERSION="${{ steps.package.outputs.version }}"
          if [[ "$VERSION" == *-* ]]; then
            PRERELEASE="${VERSION#*-}"
            CHANNEL="${PRERELEASE%%.*}"
            CHANNEL="${CHANNEL,,}"
            case "$CHANNEL" in
              alpha|beta|rc)
                TAG="$CHANNEL"
                ;;
              *)
                TAG="latest"
                ;;
            esac
          else
            TAG="latest"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - run: npm publish --provenance --access public --tag "${{ steps.dist_tag.outputs.tag }}"
        if: steps.npm_version.outputs.exists == 'false'
